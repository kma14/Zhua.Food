services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zhua
      POSTGRES_PASSWORD: zhua
      POSTGRES_DB: zhua
    ports:
      - "5433:5432"   # host 5433 -> container 5432 (5432 left free for any native Postgres)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhua -d zhua"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies migrations then exits (plan D5). Api/Worker should wait for this and never auto-migrate.
  migrator:
    build:
      context: .
      dockerfile: src/Zhua.Migrator/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=zhua;Username=zhua;Password=zhua"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Query API (plan D20) — read + admin match-review. Waits for the migrator; never migrates itself (D5).
  api:
    build:
      context: .
      dockerfile: src/Zhua.Api/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=zhua;Username=zhua;Password=zhua"
      ASPNETCORE_ENVIRONMENT: Development   # exposes /openapi; set Production for a real deploy
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  # Crawling Worker (plan D7) — Quartz cron (twice-daily) driving HEADED Playwright Chromium under xvfb.
  # Headless is WAF-blocked (D2/D17), so even on a headless host (NAS/EC2) we run headed via a virtual display.
  worker:
    build:
      context: .
      dockerfile: src/Zhua.Worker/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=zhua;Username=zhua;Password=zhua"
      Crawl__Cron: "0 0 6,18 * * ?"
      TZ: "Pacific/Auckland"   # cron uses InTimeZone(Local); make Local = Auckland so 06:00/18:00 are real
    shm_size: "1gb"            # Chromium needs >Docker's default 64MB /dev/shm or it crashes mid-crawl
    volumes:
      - crawlarchive:/app/crawl-archive   # raw response archive (D12) — keep it inspectable/persistent
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  crawlarchive:
