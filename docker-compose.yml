services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zhua
      POSTGRES_PASSWORD: zhua
      POSTGRES_DB: zhua
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhua -d zhua"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies migrations then exits (plan D5). Api/Worker should wait for this and never auto-migrate.
  migrator:
    build:
      context: .
      dockerfile: src/Zhua.Migrator/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=zhua;Username=zhua;Password=zhua"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
