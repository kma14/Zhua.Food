# Serves the built SPA and reverse-proxies the API to the `api` service on the compose
# bridge network. From the browser's view everything is one origin, so no CORS is needed.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API endpoints (mirror the paths in vite.config.ts) -> the api container.
    location ~ ^/(categories|products|deals|stores|health|admin|match-candidates|items|openapi)(/|$) {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
